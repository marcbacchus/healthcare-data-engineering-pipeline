name: dbt Docs → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt_docs.yml'
  workflow_dispatch:

# Required for the modern OIDC-based Pages deployment (no PAT needed)
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-flight runs are not cancelled
# so a merge doesn't leave Pages in a half-deployed state
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    name: Generate and deploy dbt docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.6

      - name: Generate dbt docs
        working-directory: dbt
        run: dbt docs generate --profiles-dir .
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:    ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
